<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="CellSeeU - Detect and visualize nearby cell towers">
    <title>{% block title %}CellSeeU - Cell Tower Detection{% endblock %}</title>

    <!-- Preconnect to external resources for performance -->
    <link rel="preconnect" href="https://unpkg.com">

    <!-- Leaflet.js for mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous" />

    <!-- Custom styles (mobile-first) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    {% block extra_css %}{% endblock %}
</head>

<body>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
        <symbol id="icon-tower" viewBox="0 0 24 24">
            <path d="M12 3v18" />
            <path d="m8 21 4-8 4 8" />
            <path d="M8.5 6.5a5 5 0 0 0 0 7" />
            <path d="M15.5 6.5a5 5 0 0 1 0 7" />
            <path d="M5.5 4a9 9 0 0 0 0 13" />
            <path d="M18.5 4a9 9 0 0 1 0 13" />
        </symbol>
        <symbol id="icon-satellite" viewBox="0 0 24 24">
            <path d="m13 7 4 4" />
            <path d="m9 11 4 4" />
            <path d="m8 7 9 9" />
            <path d="M5 14 14 5l5 5-9 9z" />
            <path d="M6 18 3 21" />
            <path d="M18 6l3-3" />
        </symbol>
        <symbol id="icon-wifi" viewBox="0 0 24 24">
            <path d="M5 13a10 10 0 0 1 14 0" />
            <path d="M8.5 16.5a5 5 0 0 1 7 0" />
            <path d="M12 20h.01" />
        </symbol>
        <symbol id="icon-location" viewBox="0 0 24 24">
            <path d="M12 21s7-5.3 7-11a7 7 0 1 0-14 0c0 5.7 7 11 7 11z" />
            <circle cx="12" cy="10" r="2.5" />
        </symbol>
        <symbol id="icon-radio" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="2" />
            <path d="M16.2 7.8a6 6 0 0 1 0 8.4" />
            <path d="M7.8 7.8a6 6 0 0 0 0 8.4" />
            <path d="M19 5a10 10 0 0 1 0 14" />
            <path d="M5 5a10 10 0 0 0 0 14" />
        </symbol>
        <symbol id="icon-check" viewBox="0 0 24 24">
            <path d="m5 12 4 4L19 6" />
        </symbol>
        <symbol id="icon-alert" viewBox="0 0 24 24">
            <path d="M12 3 2.5 20h19z" />
            <path d="M12 9v4" />
            <path d="M12 17h.01" />
        </symbol>
        <symbol id="icon-target" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="8" />
            <circle cx="12" cy="12" r="3" />
            <path d="M12 2v4" />
            <path d="M12 18v4" />
            <path d="M2 12h4" />
            <path d="M18 12h4" />
        </symbol>
        <symbol id="icon-chart" viewBox="0 0 24 24">
            <path d="M4 19V5" />
            <path d="M4 19h16" />
            <path d="M8 16v-5" />
            <path d="M12 16V8" />
            <path d="M16 16v-3" />
        </symbol>
    </svg>

    <!-- Main navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="brand">CellSeeU</a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/map" class="nav-link {% if request.path == '/map' %}active{% endif %}">Map</a>
                <a href="/wifi" class="nav-link {% if request.path == '/wifi' %}active{% endif %}">WiFi</a>
                <a href="/wifi3d" class="nav-link {% if request.path == '/wifi3d' %}active{% endif %}">3D View</a>
            </div>
        </div>
    </nav>

    <!-- Main content area -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text">
                Your location data stays on your device.
                <a href="#privacy" class="footer-link">Privacy Policy</a>
            </p>
            <p class="footer-legal">
                Educational and diagnostic use only. Does not intercept communications.
            </p>
        </div>
    </footer>

    <!-- Leaflet.js -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>

    <!-- Custom scripts -->
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>

    {% block extra_js %}{% endblock %}
</body>

</html>
