<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="CellSeeU - Detect and visualize nearby cell towers">
    <title>{% block title %}CellSeeU - Cell Tower Detection{% endblock %}</title>
    
    <!-- Preconnect to external resources for performance -->
    <link rel="preconnect" href="https://unpkg.com">
    
    <!-- Leaflet.js for mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="anonymous"/>
    
    <!-- Custom styles (mobile-first) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Main navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="brand">🗼 CellSeeU</a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/map" class="nav-link {% if request.path == '/map' %}active{% endif %}">Map</a>
            </div>
        </div>
    </nav>

    <!-- Main content area -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text">
                🔒 Your location data stays on your device. 
                <a href="#privacy" class="footer-link">Privacy Policy</a>
            </p>
            <p class="footer-legal">
                Educational and diagnostic use only. Does not intercept communications.
            </p>
        </div>
    </footer>

    <!-- Leaflet.js -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin="anonymous"></script>
    
    <!-- Custom scripts -->
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
